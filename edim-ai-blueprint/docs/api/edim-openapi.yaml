          type: array
          items:
            type: object
        errors:
          type: array
          items:
            type: string
    ArrangementCode:
      type: object
      properties:
        arrangementId:
          type: integer
        arrangementCode:
          type: string
        productFamily:
          type: string
        directionOption:
          type: string
        components:
          type: array
          items:
            type: object
    Drawing:
      type: object
      properties:
        drawingId:
          type: integer
        drawingNo:
          type: string
        drawingName:
          type: string
        drawingType:
          type: string
          enum:
          - ASSEMBLY
          - PART
          - LAYOUT
        dwgKind:
          type: string
          enum:
          - APPROVAL
          - MANUFACTURING
          - STANDARD
        status:
          type: string
          enum:
          - DRAFT
          - REVIEW
          - APPROVED
          - RELEASED
        currentRev:
          type: string
    DrawingDocument:
      type: object
      description: 도면 기하 표준 JSON — 프로토타입 스키마 승계
      properties:
        layers:
          type: array
          items:
            type: object
        entities:
          type: array
          items:
            type: object
            properties:
              entityType:
                type: string
