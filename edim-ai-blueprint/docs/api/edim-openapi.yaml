          type: integer
        status:
          type: string
    ProcessDef:
      type: object
      properties:
        procDefId:
          type: integer
        procCode:
          type: string
        procName:
          type: string
        department:
          type: string
        isAuto:
          type: boolean
        edges:
          type: array
