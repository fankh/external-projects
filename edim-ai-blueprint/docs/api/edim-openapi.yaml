          type: integer
        businessType:
          type: string
        directCostTotal:
          type: number
        ebit:
          type: number
        sections:
          type: object
    Quotation:
      type: object
      properties:
        quotationId:
          type: integer
        quotationNo:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        lineItems:
          type: array
          items:
            type: object
        status:
          type: string
    Project:
      type: object
      properties:
        projectId:
          type: integer
        projectNo:
          type: string
        projectName:
          type: string
        salesStage:
          type: string
