components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: 요청 오류
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: 인증 실패
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: 권한 없음 — 권한승인정의서 매트릭스
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: object
    Page:
      type: object
      properties:
        items:
          type: array
          items: {}
        nextCursor:
          type:
          - string
          - 'null'
    IdRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
    ApprovalStatus:
      type: string
      enum:
      - DRAFT
      - PENDING
      - APPROVED
      - REJECTED
    LoginRequest:
      type: object
      required:
      - loginId
      - password
      properties:
        loginId:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        userLevel:
          type: string
          enum:
          - PLATFORM
          - ADMIN
          - SETUP
          - GENERAL
    User:
      type: object
      properties:
        userId:
          type: integer
        loginId:
          type: string
        userName:
          type: string
        email:
          type: string
        department:
          type: string
        userLevel:
          type: string
        status:
          type: string
    Role:
      type: object
      properties:
        roleId:
          type: integer
        roleName:
          type: string
        permissions:
          type: array
          items:
            type: object
            properties:
              resourceType:
                type: string
              resourceKey:
                type: string
              action:
                type: string
    Tenant:
      type: object
      properties:
        tenantId:
          type: integer
        tenantCode:
          type: string
        tenantName:
          type: string
        plan:
          type: string
          enum:
          - SAAS
          - SELF_MANAGED
        status:
          type: string
    HierarchyNode:
      type: object
      properties:
        hierarchyId:
          type: integer
        parentId:
          type:
          - integer
          - 'null'
        treeType:
          type: string
          enum:
          - PRODUCT
          - GENERAL_DB
          - CONFIG
        nodeName:
          type: string
        symbol:
          type: string
        address:
          type: string
        isSystem:
          type: boolean
        approvalStatus:
          $ref: '#/components/schemas/ApprovalStatus'
    CodeGroup:
      type: object
      properties:
        groupId:
          type: integer
        groupCode:
          type: string
        groupName:
          type: string
        groupType:
          type: string
          enum:
          - SPECIFICATION
          - RAW_MATERIAL
          - GPI
          - PRODUCT
        hierarchyAddress:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              itemSlot:
                type: string
              itemName:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    valueCode:
                      type: string
                    valueName:
                      type: string
    ProductCode:
      type: object
      properties:
        productCodeId:
          type: integer
        mainCode:
          type: string
        codeName:
          type: string
        groupId:
          type: integer
        hierarchyAddress:
          type: string
        approvalStatus:
          $ref: '#/components/schemas/ApprovalStatus'
    CodeRelationship:
      type: object
      properties:
        relId:
          type: integer
        motherCodeId:
          type: integer
        childCodeId:
          type: integer
        quantity:
          type: number
        remarks:
          type: string
        slotMaps:
          type: array
          items:
            type: object
            properties:
              childSlot:
                type: string
              motherSlot:
                type:
                - string
                - 'null'
              fixedValue:
                type:
                - string
                - 'null'
            description: motherSlot XOR fixedValue
    BomExpansion:
      type: object
      description: 재귀 전개 결과 (verify_runtime.sql T1 형식)
      properties:
        finishedGoodsCode:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              level:
                type: integer
              mainCode:
                type: string
              resolvedCode:
                type: string
              resolvedSlots:
                type: object
              quantity:
                type: number
              path:
                type: string
    RunningTestResult:
      type: object
