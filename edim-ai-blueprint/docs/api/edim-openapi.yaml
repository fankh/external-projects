openapi: 3.1.0
info:
  title: EDIM API
  version: 0.1.0
  description: 'EDIM (Enterprise Digital Integration Management) REST API.


    - 원천: 컴포넌트정의서 APIS 목록 (make_openapi.py 자동 생성)

    - 규약: 개발표준 §3 — RFC 9457 오류, 커서 페이지네이션(?cursor=&limit=), 비동기 잡 202+runId, Idempotency-Key 지원

    - 인증: Bearer JWT (테넌트 claim 포함) · 권한: 권한승인정의서 매트릭스

    - 스키마는 핵심 필드 요약 — 전체 컬럼은 DB정의서 v0.4 참조'
servers:
- url: https://edim.seekerslab.com
  description: 개발
- url: https://{tenant-host}
  description: 운영 (테넌트별)
  variables:
    tenant-host:
      default: edim.example.com
security:
- bearerAuth: []
tags:
- name: AI
- name: ENG-01 Macro
- name: INT-05 QR
- name: SVC-01 Auth
- name: SVC-02 Hierarchy
- name: SVC-03 Code
- name: SVC-04 Drawing
- name: SVC-05 Table
- name: SVC-06 Toolbox
- name: SVC-07 CPQ
- name: SVC-08 Cost
- name: SVC-09 ERP
- name: SVC-10 Approval
- name: SVC-11 Print
- name: SVC-12 File
- name: SVC-13 Notify
paths:
  /api/v1/auth/login:
    post:
      tags:
      - SVC-01 Auth
      summary: 로그인 — 토큰 발급
      operationId: post_auth_login
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '201':
          description: 생성됨 (승인 대상 자산은 DRAFT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /api/v1/auth/refresh:
    post:
      tags:
      - SVC-01 Auth
      summary: 토큰 갱신
      operationId: post_auth_refresh
