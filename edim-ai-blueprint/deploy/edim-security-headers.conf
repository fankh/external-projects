# EDIM 보안 응답 헤더 (9.8) — nginx server 블록에서 include.
# 설치: /etc/nginx/snippets/edim-security-headers.conf 로 복사 후
#       server 블록에 `include snippets/edim-security-headers.conf;` 추가 → nginx -t → reload.
#
# CSP 는 Next.js 인라인 스크립트/스타일과 충돌 위험이 커 여기서 제외(별도 검증 후 추가 권장).
# 아래는 앱을 깨뜨리지 않는 표준 하드닝 집합.

# HTTPS 강제 — 다운그레이드/SSL-strip 방지 (사이트는 이미 HTTPS 전용)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# MIME 스니핑 방지
add_header X-Content-Type-Options "nosniff" always;
# 클릭재킹 방지 — 외부 프레이밍 차단
add_header X-Frame-Options "SAMEORIGIN" always;
# Referrer 최소화
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# 미사용 브라우저 기능 차단
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# 서버 버전 노출 제거 (recon 방지)
server_tokens off;
# 최소 CSP (9.9) — script/style/img/connect 는 제한하지 않아 Next 를 깨뜨리지 않는다.
#   frame-ancestors: 클릭재킹 방지(X-Frame-Options 의 현대 표준)
#   base-uri:        <base> 주입 방지
#   object-src:      <object>/<embed> 차단(구형 공격면 제거)
# 전체 CSP(script-src 등)는 Next 인라인 검증 후 후속.
add_header Content-Security-Policy "frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
