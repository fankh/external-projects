# EDIM — 호스트 nginx 서버 블록 (P6 컷오버 레퍼런스)
# edim.seekerslab.com — Next.js SSR 리버스 프록시.
#
# 컷오버 전(legacy): location / { root /var/www/edim; try_files $uri /index.html; }  (정적 SPA)
# 컷오버 후(아래):  location / → 127.0.0.1:3000 (Next SSR).  API·docs·minio·TLS·BasicAuth 는 그대로 유지.
#
# 적용:  sudo cp deploy/nginx.edim.conf /etc/nginx/sites-available/edim
#        sudo nginx -t && sudo systemctl reload nginx
# 롤백:  location / 를 정적 root 블록으로 되돌리고 reload (Next 컨테이너는 계속 떠 있어도 무방).

upstream edim_next    { server 127.0.0.1:3000; keepalive 16; }
upstream edim_backend { server 127.0.0.1:8000; keepalive 16; }

server {
    listen 443 ssl http2;
    server_name edim.seekerslab.com;

    # TLS (기존 인증서 경로 유지)
    ssl_certificate     /etc/letsencrypt/live/edim.seekerslab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edim.seekerslab.com/privkey.pem;

    client_max_body_size 64m;   # CAD/DXF 업로드 (cad/import)

    # ── API: FastAPI 직결 (Next 를 거치지 않음) ──
    location /api/v1/ {
        proxy_pass http://edim_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # Run 파이프라인·PDF 렌더
    }

    # ── FastAPI 문서 (BasicAuth 유지) ──
    location /docs   { auth_basic "EDIM"; auth_basic_user_file /etc/nginx/.htpasswd; proxy_pass http://edim_backend/docs; }
    location /openapi.json { proxy_pass http://edim_backend/openapi.json; }

    # ── MinIO 콘솔/오브젝트 (기존 프록시 유지) ──
    location /minio/ {
        proxy_pass http://127.0.0.1:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Next.js 정적 자원 (캐시 강함, 불변 해시) ──
    location /_next/static/ {
        proxy_pass http://edim_next;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── 그 외 전부: Next SSR (App Router) ──
    location / {
        proxy_pass http://edim_next;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

server {
    listen 80;
    server_name edim.seekerslab.com;
    return 301 https://$host$request_uri;
}
