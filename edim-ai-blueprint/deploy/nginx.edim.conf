# EDIM — 호스트 nginx 서버 블록 (P6 컷오버 적용본 — 2026-07-15 라이브 구성과 동기)
# edim.seekerslab.com — 메인 앱 = Next.js SSR(127.0.0.1:3000) 리버스 프록시.
#
# 유지: TLS(certbot) · 사이트 기본 Basic Auth(.edim_htpasswd) · /docs 문서 포털 ·
#       /api/v1 → FastAPI(장애 시 JSON 503) · /agents · /jenkins · /minio/ui ·
#       /edim-static (레거시 React SPA — 롤백 자산).
# Next 라우트 핸들러(/api/cad·/api/render·/api/cost)는 Next 로, 그 외 /api 는 FastAPI 로.
#
# 적용:  sudo cp deploy/nginx.edim.conf /etc/nginx/sites-available/edim.seekerslab.com
#        sudo nginx -t && sudo systemctl reload nginx
# 롤백:  location / 를 정적 try_files($uri /edim-static/index.html 계열)로 되돌리고 reload.

upstream edim_next    { server 127.0.0.1:3000; keepalive 16; }
upstream edim_backend { server 127.0.0.1:8000; keepalive 16; }

server {
    server_name edim.seekerslab.com edimsol.com www.edimsol.com;

    root /var/www/edim;
    index index.html;

    # Site-wide basic auth (앱·Jenkins·MinIO 는 자체 로그인 — 아래에서 opt out)
    auth_basic "EDIM";
    auth_basic_user_file /etc/nginx/.edim_htpasswd;

    # ── 메인 앱: Next.js SSR (자체 로그인 — basic auth 해제) ──
    location / {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16m;   # 서버 액션 폼/CAD JSON
    }

    # Next 정적 자원 (불변 해시 — 장기 캐시)
    location /_next/static/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next 라우트 핸들러 — CAD DXF 업로드/내보내기·PDF 렌더·견적서 (FastAPI /api 보다 구체적 prefix)
    location /api/cad/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        client_max_body_size 64m;
        proxy_read_timeout 120s;
    }
    location /api/render/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    location /api/cost/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    location /api/qc/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    # Next 라우트 핸들러 공용 프리픽스 — 신규 핸들러는 /api/next/ 아래에 (nginx 재수정 불요)
    location /api/next/ {
        auth_basic off;
        proxy_pass http://edim_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        client_max_body_size 64m;
        proxy_read_timeout 120s;
    }

    # Document download portal (basic auth)
    location /docs/ {
        auth_basic "EDIM Documents";
        auth_basic_user_file /etc/nginx/.edim_htpasswd;
        try_files $uri $uri/ =404;
    }

    # 레거시 React SPA 정적 자산 — 롤백 자산 (autodeploy 가 edim-web-react/dist 를 계속 rsync)
    location = /edim-static/index.html {
        auth_basic off;
        add_header Cache-Control "no-cache";
    }
    location /edim-static/assets/ {
        auth_basic off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /edim-static/ {
        auth_basic off;
        root /var/www/edim;
    }

    # EDIM API v1 — FastAPI 직결 (Next 를 거치지 않음), basic auth 해제
    location /api/v1/ {
        auth_basic off;
        proxy_intercept_errors on;
        error_page 502 503 504 = @edim_api_down;
        proxy_pass http://edim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # Run 파이프라인·PDF 렌더
    }

    # 배포(컨테이너 재기동) 중 — 프론트가 정직한 오류를 표시하도록 JSON 503
    location @edim_api_down {
        auth_basic off;
        default_type application/json;
        return 503 '{"detail":"backend deploying"}';
    }

    # Agent console (docker, 127.0.0.1:8089) - inherits EDIM basic auth
    location /agents/ {
        proxy_pass http://127.0.0.1:8089/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # 그 외 /api (FastAPI — /api/v1 외 경로·대용량)
    location /api/ {
        proxy_pass http://edim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100m;
        proxy_read_timeout 300s;
    }

    # Jenkins (container, --prefix=/jenkins)
    location /jenkins/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_request_buffering off;
        proxy_read_timeout 90s;
        client_max_body_size 200m;
    }

    # MinIO web console (container :9001)
    location /minio/ui/ {
        auth_basic off;
        rewrite ^/minio/ui/(.*) /$1 break;
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        real_ip_header X-Real-IP;
        chunked_transfer_encoding off;
        proxy_connect_timeout 300;
        client_max_body_size 1g;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/edim.seekerslab.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/edim.seekerslab.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = edim.seekerslab.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name edim.seekerslab.com;
    return 404; # managed by Certbot
}
