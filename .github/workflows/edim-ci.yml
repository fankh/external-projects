name: EDIM CI

# edim-ai-blueprint 회귀 게이트 — Next 빌드 + 백엔드 유닛/DB + 레거시 폴백 E2E.
# 서버 auto-deploy(2분 폴링)와 병행: 실패 시 커밋 상태 ✗ 로 즉시 알림.
on:
  push:
    branches: [master]
    paths: ['edim-ai-blueprint/**']
  pull_request:
    paths: ['edim-ai-blueprint/**']

concurrency:
  group: edim-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-scope:
    # 3.8 — 테넌트 스코프 정적 게이트: 테넌트 테이블을 tenant 조건 없이 만지는 신규 SQL 차단.
    # 2.9 에서 손으로 찾은 교차 테넌트 누출 3건의 재발 방지 (소스만 보므로 DB·서버 불요).
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Tenant scope gate
        working-directory: edim-ai-blueprint
        run: python tests/check_tenant_scope.py

  backend-unit:
    # C5 — 백엔드 순수 로직 단위 테스트 (macro_engine 등, DB 불요·라이브 서버 불요)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run backend unit tests
        working-directory: edim-ai-blueprint/backend
        run: python -m pytest tests/ -v

  backend-db:
    # C5 잔여 — DB 필요 로직 (승인 전이·창고 계층): services postgres + 커버리지 리포트
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edim
          POSTGRES_PASSWORD: edim
          POSTGRES_DB: edim
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U edim"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: edim-ai-blueprint/backend/requirements-dev.txt
      - name: Install backend deps
        working-directory: edim-ai-blueprint/backend
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage (unit + DB)
        working-directory: edim-ai-blueprint/backend
        env:
          DATABASE_URL: postgresql://edim:edim@localhost:5432/edim
        run: >
          python -m pytest tests/ -v
          --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: edim-ai-blueprint/backend/coverage.xml

  web-next-e2e:
    # 메인 웹 콘솔 (Next.js SSR — 2026-07-15 컷오버) — 빌드 + 풀스택 스모크 13체크
    # postgres 서비스 + FastAPI(uvicorn, 자동 마이그레이션·시드) + next start → scripts/smoke.mjs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edim
          POSTGRES_PASSWORD: edim
          POSTGRES_DB: edim
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U edim"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: edim-ai-blueprint/backend/requirements.txt
      - name: Install backend deps
        working-directory: edim-ai-blueprint/backend
        run: pip install -r requirements.txt
      - name: Start backend (migrate + seed on fresh DB)
        working-directory: edim-ai-blueprint/backend
        env:
          DATABASE_URL: postgresql://edim:edim@localhost:5432/edim
        run: |
          nohup python -m uvicorn app.main:app --port 8000 >/tmp/backend.log 2>&1 &
          for i in $(seq 1 45); do
            curl -sf http://localhost:8000/api/v1/health 2>/dev/null | grep -q '"db":true' && exit 0
            sleep 2
          done
          echo "backend health timeout"; tail -50 /tmp/backend.log; exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edim-ai-blueprint/edim-web-next/package-lock.json
      - name: Build edim-web-next
        working-directory: edim-ai-blueprint/edim-web-next
        env:
          EDIM_API_BASE: http://localhost:8000/api/v1
        run: |
          npm ci
          npm run build
      - name: Start Next SSR + run smoke (13 checks)
        working-directory: edim-ai-blueprint/edim-web-next
        env:
          EDIM_API_BASE: http://localhost:8000/api/v1
          BASE: http://localhost:3000
          EDIM_USER: edim
          EDIM_PASS: edim
        run: |
          nohup npm run start >/tmp/next.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/login && break
            sleep 2
          done
          npm run smoke || { tail -30 /tmp/next.log; exit 1; }

  regression:
    # 레거시 React SPA (롤백 자산) — 폴백 52체크 E2E (Playwright, mock 모드)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edim-ai-blueprint/edim-web-react/package-lock.json

      - name: Build edim-web-react (rollback asset)
        working-directory: edim-ai-blueprint/edim-web-react
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run fallback regression suite
        working-directory: edim-ai-blueprint
        run: |
          (cd edim-web-react && npm run preview >/tmp/preview.log 2>&1 &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/edim-static/ >/dev/null && break
            sleep 1
          done
          python tests/e2e_fallback.py
