name: KYRA AI Guardrail CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lint Java services
        run: |
          for service in api-gateway auth-service chat-service security-service \
                         bookmark-service feedback-service branching-service \
                         sharing-service insights-service analytics-service \
                         notification-service integration-service; do
            echo "=== Checking $service ==="
            cd src/backend/$service
            mvn checkstyle:check -q || true
            cd ../../..
          done

      - name: Lint Frontend
        run: |
          cd src/frontend
          npm ci
          npm run lint

      - name: Lint Python services
        run: |
          pip install ruff
          ruff check src/ml-services/

  # ============================================================
  # Test - Java
  # ============================================================
  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kyra_test
          POSTGRES_USER: kyra
          POSTGRES_PASSWORD: kyra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kyra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run migrations
        run: |
          PGPASSWORD=kyra_test psql -h localhost -U kyra -d kyra_test -f src/database/migrations/V001__initial_schema.sql || true

      - name: Test Java services
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kyra_test
          SPRING_DATASOURCE_USERNAME: kyra
          SPRING_DATASOURCE_PASSWORD: kyra_test
          REDIS_HOST: localhost
          REDIS_PASSWORD: ""
          JWT_SECRET: test-jwt-secret-must-be-at-least-64-bytes-long-for-hs512-algorithm
        run: |
          for service in api-gateway auth-service chat-service security-service \
                         bookmark-service feedback-service branching-service \
                         sharing-service insights-service analytics-service \
                         notification-service integration-service; do
            echo "=== Testing $service ==="
            cd src/backend/$service
            mvn test -B || exit 1
            cd ../../..
          done

  # ============================================================
  # Test - Python
  # ============================================================
  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Test RAG service
        run: |
          cd src/ml-services/rag-service
          pip install -r requirements.txt -r requirements-test.txt 2>/dev/null || pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short || true

      - name: Test ML service
        run: |
          cd src/ml-services/ml-service
          pip install -r requirements.txt -r requirements-test.txt 2>/dev/null || pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short || true

  # ============================================================
  # Test - Frontend
  # ============================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm ci

      - name: Run tests
        run: |
          cd src/frontend
          npm test -- --watchAll=false --passWithNoTests

      - name: Build check
        run: |
          cd src/frontend
          npm run build

  # ============================================================
  # Build & Push Docker Images
  # ============================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-java, test-python, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: api-gateway, context: src/backend/api-gateway }
          - { name: auth-service, context: src/backend/auth-service }
          - { name: chat-service, context: src/backend/chat-service }
          - { name: security-service, context: src/backend/security-service }
          - { name: analytics-service, context: src/backend/analytics-service }
          - { name: notification-service, context: src/backend/notification-service }
          - { name: integration-service, context: src/backend/integration-service }
          - { name: rag-service, context: src/ml-services/rag-service }
          - { name: ml-service, context: src/ml-services/ml-service }
          - { name: frontend, context: src/frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
