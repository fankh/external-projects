server:
  port: 8023

spring:
  application:
    name: memory-service

  datasource:
    url: jdbc:postgresql://localhost:5432/kyra_security
    username: kyra
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kyra.memory: DEBUG
    org.springframework: INFO

memory:
  ml-service:
    base-url: http://localhost:8002
  retrieval:
    top-k: 20
    recency-weight: 0.3
    importance-weight: 0.4
    access-weight: 0.3
