spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_security
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD:kyra}

  data:
    redis:
      host: redis
      port: 6379

  mail:
    host: ${SMTP_HOST:mailhog}
    port: ${SMTP_PORT:1025}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: notification-service
