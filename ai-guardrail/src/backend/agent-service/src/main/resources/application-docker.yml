spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_security
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD:kyra}

  data:
    redis:
      host: redis
      port: 6379

ml-service:
  base-url: http://ml-service:8010

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: agent-service
