server:
  port: 8082

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5432/kyra_chat
    username: kyra
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false

services:
  ml:
    url: http://localhost:8083
  rag:
    url: http://localhost:8084
  security:
    url: http://localhost:8085

chat:
  context:
    max-messages: 10
  memory:
    update-interval: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kyra.chat: DEBUG
    org.springframework.web: INFO
