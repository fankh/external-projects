spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_chat
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD:kyra}

  data:
    redis:
      host: redis
      port: 6379

services:
  ml:
    url: http://ml-service:8083
  rag:
    url: http://rag-service:8084
  security:
    url: http://security-service:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: chat-service
