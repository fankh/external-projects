server:
  port: 8031

spring:
  application:
    name: integration-service

  datasource:
    url: jdbc:postgresql://localhost:5432/kyra
    username: kyra
    password: ${DB_PASSWORD:kyra_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

jwt:
  secret: ${JWT_SECRET:default-dev-secret-must-be-at-least-64-bytes-long-for-hs512-algorithm-change-in-prod}

slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  signing-secret: ${SLACK_SIGNING_SECRET:}

teams:
  app-id: ${TEAMS_APP_ID:}
  app-secret: ${TEAMS_APP_SECRET:}
  tenant-id: ${TEAMS_TENANT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kyra.integration: DEBUG
    org.springframework.security: INFO
