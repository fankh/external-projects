spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  signing-secret: ${SLACK_SIGNING_SECRET:}

teams:
  app-id: ${TEAMS_APP_ID:}
  app-secret: ${TEAMS_APP_SECRET:}
  tenant-id: ${TEAMS_TENANT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kyra.integration: INFO
    org.springframework.security: WARN
