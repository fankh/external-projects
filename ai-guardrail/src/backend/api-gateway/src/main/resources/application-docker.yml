spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

services:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  chat-service:
    url: ${CHAT_SERVICE_URL:http://chat-service:8082}
  rag-service:
    url: ${RAG_SERVICE_URL:http://rag-service:8083}
  security-service:
    url: ${SECURITY_SERVICE_URL:http://security-service:8084}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: INFO
    com.kyra.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: api-gateway
