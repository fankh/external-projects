spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_billing
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD:kyra}

  data:
    redis:
      host: redis
      port: 6379

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: billing-service
