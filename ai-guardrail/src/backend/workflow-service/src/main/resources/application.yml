server:
  port: 8029

spring:
  application:
    name: workflow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/kyra_guardrail
    username: kyra
    password: ${DB_PASSWORD:kyra_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

services:
  ml:
    url: http://localhost:8083
  rag:
    url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.kyra.workflow: DEBUG
    org.springframework.web: INFO
