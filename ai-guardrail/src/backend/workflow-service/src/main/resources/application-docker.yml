spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_guardrail
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD}

services:
  ml:
    url: http://ml-service:8083
  rag:
    url: http://rag-service:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kyra.workflow: INFO
    org.springframework.web: WARN
