spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_auth
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kyra.auth: INFO
    org.springframework.security: WARN
