spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kyra_chat
    username: ${DB_USERNAME:kyra}
    password: ${DB_PASSWORD:kyra}

  data:
    redis:
      host: redis
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: insights-service
