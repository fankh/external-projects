alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ============================================================
  # Prometheus self-monitoring
  # ============================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================
  # Java / Spring Boot Services (Actuator + Prometheus endpoint)
  # ============================================================
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          service: api-gateway
          type: java

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
        labels:
          service: auth-service
          type: java

  - job_name: 'chat-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['chat-service:8082']
        labels:
          service: chat-service
          type: java

  - job_name: 'security-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['security-service:8083']
        labels:
          service: security-service
          type: java

  - job_name: 'analytics-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['analytics-service:8084']
        labels:
          service: analytics-service
          type: java

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']
        labels:
          service: notification-service
          type: java

  - job_name: 'bookmark-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['bookmark-service:8014']
        labels:
          service: bookmark-service
          type: java

  - job_name: 'feedback-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['feedback-service:8015']
        labels:
          service: feedback-service
          type: java

  - job_name: 'branching-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['branching-service:8017']
        labels:
          service: branching-service
          type: java

  - job_name: 'sharing-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sharing-service:8018']
        labels:
          service: sharing-service
          type: java

  - job_name: 'insights-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['insights-service:8019']
        labels:
          service: insights-service
          type: java

  - job_name: 'integration-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['integration-service:8031']
        labels:
          service: integration-service
          type: java

  # ============================================================
  # Python / FastAPI Services
  # ============================================================
  - job_name: 'rag-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rag-service:8001']
        labels:
          service: rag-service
          type: python

  - job_name: 'ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml-service:8002']
        labels:
          service: ml-service
          type: python

  # ============================================================
  # Infrastructure
  # ============================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
          type: infrastructure

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres
          type: infrastructure

  - job_name: 'ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml-service:8002']
        labels:
          service: ml-service
          type: python

  - job_name: 'rag-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rag-service:8001']
        labels:
          service: rag-service
          type: python
