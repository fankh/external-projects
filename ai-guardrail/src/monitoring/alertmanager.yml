global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/slack_url

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: critical-slack
      group_wait: 10s
      repeat_interval: 1h
    - matchers:
        - severity = warning
      receiver: warnings-slack

receivers:
  - name: default
    # No-op (visible only in alertmanager logs)
    webhook_configs:
      - url: http://kyra-alertmanager:9093/-/ready
        send_resolved: true

  - name: critical-pagerduty
    pagerduty_configs:
      - service_key_file: /etc/alertmanager/pagerduty_key
        severity: critical
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'

  - name: critical-slack
    slack_configs:
      - channel: '#kyra-critical'
        send_resolved: true
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
            *{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            *severity:* {{ .Labels.severity }}
          {{ end }}

  - name: warnings-slack
    slack_configs:
      - channel: '#kyra-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
            {{ .Annotations.summary }}
          {{ end }}

inhibit_rules:
  - source_matchers: [severity = critical]
    target_matchers: [severity = warning]
    equal: [alertname]
