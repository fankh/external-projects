      FEEDBACK_SERVICE_URL: http://feedback-service:8015
      BRANCHING_SERVICE_URL: http://branching-service:8017
      SHARING_SERVICE_URL: http://sharing-service:8018
      INSIGHTS_SERVICE_URL: http://insights-service:8019
