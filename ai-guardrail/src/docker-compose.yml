  # ============================================================
  # Frontend
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://kyra-guardrail-dev.seekerslab.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://kyra-guardrail-dev.seekerslab.com/ws
    container_name: kyra-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://kyra-guardrail-dev.seekerslab.com/api/v1
      NEXT_PUBLIC_WS_URL: wss://kyra-guardrail-dev.seekerslab.com/ws
    depends_on:
      - api-gateway
    networks:
      - kyra-network

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://kyra-guardrail-dev.seekerslab.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://kyra-guardrail-dev.seekerslab.com/ws
        NEXT_PUBLIC_CHAT_URL: https://kyra-guardrail-dev.seekerslab.com
    container_name: kyra-admin
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://kyra-guardrail-dev.seekerslab.com/api/v1
      NEXT_PUBLIC_WS_URL: wss://kyra-guardrail-dev.seekerslab.com/ws
      NEXT_PUBLIC_CHAT_URL: https://kyra-guardrail-dev.seekerslab.com
    depends_on:
      - api-gateway
    networks:
      - kyra-network

    # ============================================================
  # Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: kyra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - kyra-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    container_name: kyra-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - kyra-network


  backup:
    image: postgres:16-alpine
    container_name: kyra-backup
    restart: unless-stopped
    environment:
      PG_HOST: postgres
      PG_USER: ${POSTGRES_USER:-kyra}
      PGPASSWORD: ${POSTGRES_PASSWORD:-kyra_secret}
      PG_DB: kyra
      MINIO_ENDPOINT: http://milvus-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-eHdqQ4yBpLjKPX0sop55}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-7EyECyNbC18v4TmccBiWJamOsvx2EC08ro00vGZm}
      TZ: UTC
      AWS_BACKUP_BUCKET: ${AWS_BACKUP_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./ops:/ops:ro
      - /data/backups:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache dcron coreutils findutils >/dev/null
        echo "0 3 * * * /ops/backup.sh >> /backups/backup.log 2>&1" > /etc/crontabs/root
        echo "Backup scheduler started. Writing to /backups/backup.log"
        touch /backups/backup.log
        tail -F /backups/backup.log &
        crond -f
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kyra-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: kyra-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - kyra-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: kyra-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - kyra-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kyra-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/slack_url_stub:/etc/alertmanager/slack_url:ro
      - ./monitoring/pagerduty_key_stub:/etc/alertmanager/pagerduty_key:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - kyra-network

volumes:
  alertmanager_data:
  grafana_data:
  prometheus_data:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  opensearch_data:

networks:
  kyra-network:
    driver: bridge
