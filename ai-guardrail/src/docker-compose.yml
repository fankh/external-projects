      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-kyra_redis}
      JWT_SECRET: ${JWT_SECRET:-kyra-jwt-secret-key-change-in-production}
      AUTH_SERVICE_URL: http://auth-service:8081
      CHAT_SERVICE_URL: http://chat-service:8082
      SECURITY_SERVICE_URL: http://security-service:8083
      RAG_SERVICE_URL: http://rag-service:8001
      ML_SERVICE_URL: http://ml-service:8002
