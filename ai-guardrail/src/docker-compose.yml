version: '3.9'

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: kyra-postgres
    command: postgres -c max_connections=400 -c shared_buffers=256MB
    environment:
      POSTGRES_DB: kyra
      POSTGRES_USER: ${POSTGRES_USER:-kyra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kyra_secret}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyra"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyra-network

  redis:
    image: redis:7-alpine
    container_name: kyra-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-kyra_redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-kyra_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyra-network

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: kyra-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kyra-network

  milvus-minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: kyra-milvus-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-eHdqQ4yBpLjKPX0sop55}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-7EyECyNbC18v4TmccBiWJamOsvx2EC08ro00vGZm}
    ports:
      - "127.0.0.1:9001:9001"
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local >/dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kyra-network

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: kyra-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kyra-network

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: kyra-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kyra-network

