      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      CORS_ALLOWED_ORIGINS: https://kyra-guardrail-dev.seekerslab.com,https://admin.kyra-guardrail-dev.seekerslab.com
      TENANT_SERVICE_URL: http://tenant-service:8026
      BILLING_SERVICE_URL: http://billing-service:8027
      AGENT_SERVICE_URL: http://agent-service:8028
      WORKFLOW_SERVICE_URL: http://workflow-service:8029
      SSO_SERVICE_URL: http://sso-service:8030
      INTEGRATION_SERVICE_URL: http://integration-service:8031
      MEMORY_SERVICE_URL: http://memory-service:8023
    volumes:
      - ./otel/agent:/otel:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kyra-network

