syntax = "proto3";

package kyra.security.v1;

option java_package = "com.kyra.security.grpc";
option java_outer_classname = "SecurityProto";

// Permission check — the hot path for fine-grained access control
service PermissionService {
  rpc Check (PermissionCheckRequest) returns (PermissionCheckResponse);
  rpc BatchCheck (BatchPermissionCheckRequest) returns (BatchPermissionCheckResponse);
}

message PermissionCheckRequest {
  string tenant_id = 1;
  string user_id = 2;
  string role = 3;
  string resource_type = 4;
  string resource_id = 5;
  string action = 6;
  map<string, string> context = 7;
}

message PermissionCheckResponse {
  bool allowed = 1;
  string reason = 2;
  string matched_grant_id = 3;
}

message BatchPermissionCheckRequest {
  repeated PermissionCheckRequest checks = 1;
}

message BatchPermissionCheckResponse {
  repeated PermissionCheckResponse results = 1;
}

// PHI scan
service PhiService {
  rpc Scan (PhiScanRequest) returns (PhiScanResponse);
}

message PhiScanRequest {
  string content = 1;
  string user_id = 2;
  string direction = 3;
}

message PhiScanResponse {
  int32 hit_count = 1;
  repeated string types = 2;
  string masked_content = 3;
  string severity = 4;
  bool blocked = 5;
}

// Audit
service AuditService {
  rpc LogEvent (AuditEventRequest) returns (AuditEventResponse);
  rpc VerifyChain (VerifyChainRequest) returns (VerifyChainResponse);
}

message AuditEventRequest {
  string tenant_id = 1;
  string user_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string status = 6;
  string details_json = 7;
}

message AuditEventResponse {
  string id = 1;
  string entry_hash = 2;
}

message VerifyChainRequest {
  string tenant_id = 1;
}

message VerifyChainResponse {
  bool verified = 1;
  int32 checked_count = 2;
  repeated string broken_ids = 3;
}
