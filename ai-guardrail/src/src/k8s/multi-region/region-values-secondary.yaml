# Helm values — Secondary region (us-west-2)
global:
  region: us-west-2
  isPrimary: false
  databaseUrl: "jdbc:postgresql://kyra-replica.xxxxx.us-west-2.rds.amazonaws.com:5432/kyra"
  redisUrl: "redis://kyra-redis-secondary.xxxxx.usw2.cache.amazonaws.com:6379"
  readOnly: true  # secondary serves reads only until failover

replicaCount:
  apiGateway: 2
  authService: 1
  chatService: 2
  securityService: 1
  ragService: 1
  mlService: 1

ingress:
  host: kyra-guardrail-dr.seekerslab.com
  tls: true
